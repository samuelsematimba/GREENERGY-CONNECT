{% extends "base.html" %}
{% block title %}New Product{% endblock %}
{% block content %}
<div class="page-header flex-between">
    <div><h1>New Product</h1><p>Add a product to the catalogue</p></div>
    <a href="{% url 'products:product_list' %}" class="btn btn-outline">← Back</a>
</div>
<div class="card" style="max-width:700px;">
    <form method="POST" enctype="multipart/form-data">{% csrf_token %}
        <div class="form-row">
            <div class="form-group"><label>Product Name</label><input type="text" name="name" required placeholder="e.g. EcoStove Pro 3-Burner"></div>
            <div class="form-group"><label>SKU / Product Code</label><input type="text" name="sku" required placeholder="Unique code e.g. STK-001"></div>
        </div>
        <div class="form-row-3">
            <div class="form-group"><label>Category</label>
                <select name="category"><option value="">Select…</option>
                    {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group"><label>Product Type</label>
                <select name="product_type" required>
                    <option value="">Select…</option>
                    <option value="serialized">Serialized (QR tracked)</option>
                    <option value="non_serialized">Non-Serialized (qty only)</option>
                </select>
            </div>
            <div class="form-group"><label>Unit</label>
                <select name="unit">
                    <option value="piece">Piece</option><option value="litre">Litre</option>
                    <option value="kg">Kilogram</option><option value="set">Set</option><option value="pack">Pack</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Base Price</label><input type="number" name="base_price" required placeholder="0" step="0.01"></div>
            <div class="form-group"><label>Product Image</label><input type="file" name="image" accept="image/*"></div>
        </div>
        <div class="form-group"><label>Description</label><textarea name="description" placeholder="Optional product description…"></textarea></div>
        <div class="form-group"><label>Available Countries</label>
            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;">
                {% for c in countries %}<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:400;">
                    <input type="checkbox" name="countries" value="{{ c.id }}" style="width:auto;"> {{ c.name }}
                </label>{% endfor %}
            </div>
        </div>
        <div class="btn-group mt-16">
            <button type="submit" class="btn btn-primary">Create Product</button>
            <a href="{% url 'products:product_list' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
