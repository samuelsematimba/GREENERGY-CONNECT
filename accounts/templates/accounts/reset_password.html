{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="page-header flex-between">
    <div><h1>Reset Password — {{ profile.full_name }}</h1><p>Set a new temporary password for this user</p></div>
    <a href="{% url 'accounts:user_list' %}" class="btn btn-outline">← Back</a>
</div>
<div class="card" style="max-width:480px;">
    <form method="POST">{% csrf_token %}
        <div class="form-group"><label>New Temporary Password</label><input type="text" name="new_password" required placeholder="Enter new password"></div>
        <p class="text-muted mt-8">The user will be required to change this password on next login.</p>
        <div class="btn-group mt-16">
            <button type="submit" class="btn btn-primary">Reset Password</button>
            <a href="{% url 'accounts:user_list' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
