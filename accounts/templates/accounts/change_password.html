{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="page-header"><h1>Change Password</h1><p>Update your account password</p></div>
<div class="card" style="max-width:480px;">
    <form method="POST">{% csrf_token %}
        <div class="form-group"><label>Current Password</label><input type="password" name="current_password" required></div>
        <div class="form-group"><label>New Password</label><input type="password" name="new_password" required placeholder="Min 8 characters"></div>
        <div class="form-group"><label>Confirm New Password</label><input type="password" name="confirm_password" required></div>
        <div class="btn-group mt-16">
            <button type="submit" class="btn btn-primary">Update Password</button>
            <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
