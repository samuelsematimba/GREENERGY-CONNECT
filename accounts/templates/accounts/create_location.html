{% extends "base.html" %}
{% block title %}Add Location{% endblock %}
{% block content %}
<div class="page-header flex-between">
    <div><h1>Add Location</h1><p>Create a new warehouse, outlet or office</p></div>
    <a href="{% url 'accounts:locations' %}" class="btn btn-outline">← Back</a>
</div>
<div class="card" style="max-width:600px;">
    <form method="POST">{% csrf_token %}
        <div class="form-row">
            <div class="form-group"><label>Location Name</label><input type="text" name="name" required placeholder="e.g. Kampala Central Warehouse"></div>
            <div class="form-group"><label>Type</label>
                <select name="location_type" required>
                    <option value="">Select type…</option>
                    <option value="warehouse">Warehouse</option>
                    <option value="outlet">Outlet</option>
                    <option value="office">Office</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Country</label>
                <select name="country" required>
                    <option value="">Select country…</option>
                    {% for c in countries %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group"><label>Affiliated Warehouse (Outlets only)</label>
                <select name="affiliated_warehouse">
                    <option value="">None</option>
                    {% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group"><label>Address</label><textarea name="address" placeholder="Physical address…"></textarea></div>
        <div class="btn-group mt-16">
            <button type="submit" class="btn btn-primary">Create Location</button>
            <a href="{% url 'accounts:locations' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
