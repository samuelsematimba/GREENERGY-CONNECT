{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREENERGY — Customer Collection Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --teal: #00B8A9; --ink: #0d1f1e; --white: #ffffff;
            --muted: rgba(255,255,255,0.5);
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(0,184,169,0.18);
            --nav-h: 68px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--white); min-height: 100vh; }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at 10% 20%, rgba(0,184,169,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 90% 80%, rgba(0,184,169,0.07) 0%, transparent 50%);
            pointer-events: none;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: var(--nav-h); display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; background: rgba(13,31,30,0.85); backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(0,184,169,0.12);
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--teal), #00e5d4); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--ink); }
        .nav-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; color: var(--white); }
        .nav-title span { color: var(--teal); }
        .btn-back { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: transparent; border: 1px solid rgba(0,184,169,0.3); border-radius: 10px; color: var(--white); font-size: 13px; font-weight: 600; text-decoration: none; font-family: 'Syne', sans-serif; transition: background 0.2s, border-color 0.2s, color 0.2s; }
        .btn-back:hover { background: rgba(0,184,169,0.1); border-color: var(--teal); color: var(--teal); }

        .page { position: relative; z-index: 1; padding-top: calc(var(--nav-h) + 48px); padding-bottom: 64px; max-width: 750px; margin: 0 auto; padding-left: 24px; padding-right: 24px; animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        /* header logos */
        .form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .form-header-logos { display: flex; align-items: center; gap: 16px; }
        .form-header-logos img { height: 48px; width: auto; filter: brightness(1.1); }
        .page-label { font-size: 20px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
        .page-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 600; color: var(--white); }

        /* section cards */
        .form-section {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 32px; margin-bottom: 20px;
        }
        .section-label {
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
            color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 24px; padding-bottom: 14px;
            border-bottom: 1px solid rgba(0,184,169,0.1);
        }
        .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .fields-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
        .field-full { grid-column: 1 / -1; }

        .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
        .field input, .field select {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,184,169,0.2); border-radius: 12px;
            padding: 13px 16px; font-size: 15px; color: var(--white);
            font-family: 'DM Sans', sans-serif; outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            -webkit-text-fill-color: var(--white);
        }
        .field input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px #112322 inset; -webkit-text-fill-color: var(--white); }
        .field input:focus, .field select:focus { border-color: var(--teal); background: rgba(0,184,169,0.06); box-shadow: 0 0 0 3px rgba(0,184,169,0.12); }
        .field input::placeholder { color: rgba(255,255,255,0.2); }
        .field select option { background: #112322; color: var(--white); }

        /* file input */
        .field input[type="file"] {
            padding: 10px 16px; cursor: pointer;
            -webkit-text-fill-color: var(--muted);
        }
        .field input[type="file"]::file-selector-button {
            background: rgba(0,184,169,0.15);
            border: 1px solid rgba(0,184,169,0.3);
            border-radius: 8px; color: var(--teal);
            padding: 6px 14px; cursor: pointer; font-size: 13px;
            margin-right: 12px; transition: background 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .field input[type="file"]::file-selector-button:hover { background: rgba(0,184,169,0.25); }

        /* date input */
        .field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }

        .btn-submit {
            width: 100%; background: linear-gradient(135deg, var(--teal), #00e5d4);
            border: none; border-radius: 14px; padding: 16px;
            font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 500;
            color: var(--ink); cursor: pointer; margin-top: 8px;
            box-shadow: 0 8px 24px rgba(0,184,169,0.3);
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,184,169,0.45); filter: brightness(1.05); }

        @media (max-width: 700px) {
            nav { padding: 0 20px; }
            .fields-grid, .fields-grid.cols-3 { grid-template-columns: 1fr; }
            .form-section { padding: 22px 18px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'GREENERGYFORMS:index' %}" class="nav-brand">
            <div class="nav-logo">
                <img src="{% static 'GREENERGYFORMS/GREENERGY.png' %}" alt="logo" style="width:45px; height:36px;">
            </div>
            <span class="nav-title">GREEN<span>ERGY</span></span>
        </a>
        <a href="{% url 'GREENERGYFORMS:index' %}" class="btn-back">← Back to Home</a>
    </nav>

    <div class="page">
        <div class="form-header">
            <div>
                <p class="page-label">Sales</p>
                <h1 class="page-title">CUSTOMER COLLECTION FORM</h1>
            </div>
            <div class="form-header-logos">
                <img src="{% static 'GREENERGYFORMS/bukona.png' %}" alt="Bukona Agro" />
                <img src="{% static 'GREENERGYFORMS/green.png' %}" alt="Greenergy" />
            </div>
        </div>

        <form action="{% url 'GREENERGYFORMS:save' %}" enctype="multipart/form-data" method="POST">
            {% csrf_token %}

            <!-- Customer Details -->
            <div class="form-section">
                <p class="section-label">Customer Details</p>
                <div class="fields-grid">
                    <div class="field">
                        <label>Given Name</label>
                        <input type="text" name="customer_name" placeholder="First name" />
                    </div>
                    <div class="field">
                        <label>Surname</label>
                        <input type="text" name="surname" placeholder="Last name" />
                    </div>
                    <div class="field">
                        <label>NIN</label>
                        <input type="text" name="ninnumber" placeholder="National ID Number" />
                    </div>
                    <div class="field">
                        <label>Phone Number</label>
                        <input type="tel" name="phonenumber" placeholder="e.g. 0700 000 000" />
                    </div>
                    <div class="field">
                        <label>Location</label>
                        <input type="text" name="location2" placeholder="Enter location" />
                    </div>
                    <div class="field">
                        <label>Gender</label>
                        <select name="gender">
                            <option value="none">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Products -->
            <div class="form-section">
                <p class="section-label">Products</p>
                <div class="fields-grid cols-3">
                    <div class="field">
                        <label>Stove</label>
                        <select name="stove">
                            <option value="none">Select stove</option>
                            <option value="SINGLEBURNER">SB Combo</option>
                            <option value="DOUBLEBURNER">DB Combo</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Serial Number</label>
                        <input type="text" name="serialnumber" placeholder="Serial number" />
                    </div>
                    <div class="field">
                        <label>Quantity</label>
                        <input type="number" name="quantity" placeholder="0" min="0" />
                    </div>
                    <div class="field">
                        <label>Subsidy</label>
                        <select name="subcidy">
                            <option value="none">None</option>
                            <option value="UECCC">UECCC High (120,000)</option>
                            <option value="UECCC2">UECCC Low (118,000)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Others</label>
                        <select name="others">
                            <option value="none">Select</option>
                            <option value="FUEL">Fuel</option>
                            <option value="sp">Spares</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Payment Details -->
            <div class="form-section">
                <p class="section-label">Payment Details</p>
                <div class="fields-grid">
                    <div class="field">
                        <label>Date of Sale</label>
                        <input type="date" name="date" />
                    </div>
                    <div class="field">
                        <label>Ledger Type</label>
                        <select name="select">
                            <option value="CASH">Cash</option>
                            <option value="promotion">Promotion</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Amount Expected (UGX)</label>
                        <input type="number" name="expected" placeholder="0" min="0" />
                    </div>
                    <div class="field">
                        <label>Cash Received (UGX)</label>
                        <input type="number" name="cashreceived" placeholder="0" min="0" />
                    </div>
                </div>
            </div>

            <!-- Attachments -->
            <div class="form-section">
                <p class="section-label">Attachment Details</p>
                <div class="fields-grid">
                    <div class="field">
                        <label>National ID</label>
                        <input type="file" name="nationalid" accept="image/*,.pdf" />
                    </div>
                    <div class="field">
                        <label>Warranty Card</label>
                        <input type="file" name="warrantycard" accept="image/*,.pdf" />
                    </div>
                    <div class="field">
                        <label>Receipt</label>
                        <input type="file" name="reciepts" accept="image/*,.pdf" />
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit">SUBMIT FORM →</button>
        </form>
    </div>
</body>
</html>
