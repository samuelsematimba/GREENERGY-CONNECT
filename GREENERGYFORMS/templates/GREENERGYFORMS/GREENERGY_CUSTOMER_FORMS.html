{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'GREENERGYFORMS/style.css' %}" type="text/css" rel="stylesheet">
    <title>GREENERGY_CUSTOMER_FORMS</title>
</head>
<body>
    <nav class= "navi">
       <li> <a href='{%url "GREENERGYFORMS:index" %}'> Home </a></li>
       <li> <a href='{%url "GREENERGYFORMS:GREENERGY_CUSTOMER_FORMS" %}'> Form </a></li>
       <li> <a href='{%url "GREENERGYFORMS:view_data" %}'> Data-view </a></li>
    </nav>
    <form action="{% url 'GREENERGYFORMS:save' %}" enctype="multipart/form-data" method="POST">
        {% csrf_token %}
        <header>
            <h2>GREENERGY CUSTOMER COLLECTION FORM</h2>
            <div class="header-box" style="display:flex;justify-content:space-between;align-items:center; width:130%">
                <img src="{% static 'GREENERGYFORMS/bukona.png' %}" alt="bukonalogo" style="height:60px;width:120px;">
                <img src="{% static 'GREENERGYFORMS/gn.png' %}" alt="greenergylogo" style="height:60px;width:120px;align-items:center;">
            </div>
        </header>
        <fieldset class="customer_det">
            <legend>
                <h3>Customer details</h3>
            </legend>
            <div class="column">
                <div class="form-group">  
                    <label id="gn" for="cd">GIVEN NAME</label>
                    <input class= "clm2" type="text" name="customer_name"  />
                </div>
                <div class="form-group">
                    <label id="sn" for="sd">SURNAME</label>
                    <input class="clm" type="text" name="surname"  />
                </div>
                <div class="form-group">
                    <label id="ad" for="nin">NIN</label>
                    <input class="clm2" type="text" name="ninnumber"  />
                </div>
            </div>
            <div class="column">
                <div class="form-group">
                    <label for="loc">LOCATION</label>
                    <input class="clm" type="text" name="location2" />
                </div>
                <div class="form-group">
                    <label for="phn" name ="phonenumber">PHONE NUMBER</label>
                    <input class="clm2" type="tel" name="phonenumber" />
                </div>
                <div class="form-group">
                    <label for="gen" name="gender">GENDER</label>
                    <select class="clm" name ="gender" size="1"> 
                        <option value="none">select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>
        </fieldset>
        <fieldset>
            <legend>
                <h3>Products</h3>
            </legend>
            <div class="column">
                <div class="form-group">
                    <label for="prod">STOVE</label>
                    <select id ="prod" class="combo" name="stove" >
                        <option value="none">select</option>
                        <option value="SINGLEBURNER">SB Combo</option>
                        <option value="DOUBLEBURNER">DB Combo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="serial">SERIAL NUMBER</label>
                    <input type="text" name="serialnumber" size="24"/>
                </div>
                <div class="form-group">
                    <label for="qty">QUANTITY</label>
                    <input type="number" name="quantity" size="5"/>
                </div>
            </div>
            <div class="column">
                <div class="form-group">
                    <label for="subcidy">SUBSIDY</label>
                    <select id="subcidy" class="combo" name="subcidy">
                        <option value="none">none</option>
                        <option value="UECCC">Ueccc High(120000)</option>
                        <option value="UECCC2">Ueccc low(118000)</option>
                    </select>               
                </div>
                <div class="form-group">
                    <label for="oths">OTHERS</label>
                    <select id="oths" name="others">
                        <option value="none">select</option>
                        <option value="FUEL">fuel</option>
                        <option value="sp">Spares</option>
                    </select>
                </div>
            </div>
        </fieldset>
        <fieldset>
            <legend>
                <h3>Payment details</h3>
            </legend>
            <div class="column">
                <div class="form-group">
                    <label for="paym">DATE OF SALE</label>
                    <input id="paym" type="date" name="date" size="24" />
                </div>
                <div class="form-group">
                    <label for="LDG" name="ledger">LEDGER TYPE</label>
                    <select id="LDG" name="select" size="1">
                        <option value="CASH">Cash</option>
                        <option value="promotion">Promotion</option>
                    </select>
                </div>
            </div>
            <div class="column">
                <div class="form-group">
                    <label for="amte" name="expected">AMOUNT EXPECTED</label>
                    <input id="amte" type="number" name="expected" size="24" />
                </div>
                <div class="form-group">
                    <label for="cah" name="cashreceived" size="20">CASH RECIEVED</label>
                    <input type="number" name="cashreceived" size="24" />
                 </div>
            </div>
        </fieldset>
        <fieldset>
            <legend>
                <h3>Attachment Details</h3>
            </legend>
            <div class="column">
                <div class="form-group">
                    <label for="attachment">NATIONAL ID</label>
                    <input id="attachment" type="file" name="nationalid" size="20" />
                </div>
                <div class="form-group">
                     <label for="attchment2">WARRATNTY CARD</label>
                    <input id="attchment2" type="file" name="warrantycard" size="20" />
                </div>       
                <div class="form-group">
                    <label for="attachment3">RECIEPTS</label>
                    <input id="attachment3" type="file" name="reciepts" size="20" />
                </div>
            </div>
        </fieldset>
    </forms>
    <br />
    <button id="btt" type="submit" style=
    "background-color: rgb(15, 216, 55);
    height:20px;
    border-radius:4px;
    justify-content:center;
    font-family: sans-serif;
    display:flex;
    width:350px">SUBMIT FORM</button>
</body>
</html>
